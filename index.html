<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>COGS Lab — Cognitive Systems Research</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,700;1,500&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet" />
  
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <nav id="main-nav">
    <a class="nav-brand" href="#home">
      <img src="images/PEARL Logo v2.png" alt="PEARL Lab Logo" id="nav-logo" />
      <span id="nav-lab-name"></span>
    </a>
    <a class="nav-link" href="#home">Home</a>
    <a class="nav-link" href="#pi">Director</a> <a class="nav-link" href="#people">People</a>
    <a class="nav-link" href="#publications">Publications</a>
    <a class="nav-link" href="#news">News</a>
  </nav>

  <section id="home">
    <div class="hero-eyebrow" id="hero-affiliation"></div>
    <h1 id="hero-fullname"></h1>
    <p class="hero-tagline" id="hero-tagline"></p>
    <p class="hero-desc" id="hero-desc"></p>
    <div class="hero-meta" id="hero-meta"></div>
    <div class="hero-buttons">
      <a class="btn btn-primary" href="#publications">Our Research</a>
      <a class="btn btn-outline" href="#people">Meet the Team</a>
    </div>
    <div class="themes-grid" id="themes-grid"></div>
  </section>

  <section id="pi">
    <p class="section-label">Leadership</p>
    <h2>Director</h2>
    <div id="pi-container"></div>
  </section>

  <section id="people">
    <p class="section-label">Team</p>
    <h2>People</h2>
    <div id="people-container"></div>
  </section>

  <section id="publications">
    <p class="section-label">Research</p>
    <h2>Publications</h2>
    <div class="pub-filters" id="pub-filters"></div>
    <div class="pub-list" id="pub-list"></div>
  </section>

  <section id="news">
    <p class="section-label">Updates</p>
    <h2>News</h2>
    <div class="news-list" id="news-list"></div>
  </section>

  <footer id="footer"></footer>

  <div class="modal-overlay" id="modal-overlay" role="dialog" aria-modal="true">
    <div class="modal" id="modal">
      <button class="modal-close" id="modal-close" aria-label="Close">✕</button>
      <div id="modal-content"></div>
    </div>
  </div>

  <script src="script.js" defer></script>
</body>
</html>
